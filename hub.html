<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZConnects Enterprise | Command Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #2563eb; --primary-hover: #1d4ed8;
            --success: #10b981; --warning: #f59e0b; --danger: #ef4444; --purple: #8b5cf6;
            --bg-main: #f8fafc; --white: #ffffff; --navy: #0f172a; --slate: #64748b; 
            --slate-light: #94a3b8; --border: #e2e8f0; --sidebar-bg: #020617;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05); --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1); --shadow-lg: 0 20px 25px -5px rgb(0 0 0 / 0.1);
            --pill-inbox-bg: #eff6ff; --pill-inbox-txt: #1e3a8a;
            --pill-pipe-bg: #fffbeb; --pill-pipe-txt: #92400e;
            --pill-disp-bg: #f3e8ff; --pill-disp-txt: #581c87;
            --pill-comp-bg: #ecfdf5; --pill-comp-txt: #065f46;
            --pill-arch-bg: #f1f5f9; --pill-arch-txt: #475569;
        }

        [data-theme="dark"] {
            --bg-main: #0f172a; --white: #1e293b; --navy: #f8fafc; --slate: #cbd5e1; --slate-light: #64748b; --border: #334155; --sidebar-bg: #020617;
            --pill-inbox-bg: rgba(37, 99, 235, 0.2); --pill-inbox-txt: #60a5fa;
            --pill-pipe-bg: rgba(245, 158, 11, 0.2); --pill-pipe-txt: #fbbf24;
            --pill-disp-bg: rgba(139, 92, 246, 0.2); --pill-disp-txt: #c084fc;
            --pill-comp-bg: rgba(16, 185, 129, 0.2); --pill-comp-txt: #34d399;
        }

        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg-main); margin: 0; color: var(--navy); display: flex; min-height: 100vh; overflow-x: hidden; transition: 0.3s; }
        #appContainer { display: none; width: 100%; flex-direction: row; }
        #appContainer.authenticated { display: flex; }

        /* Login */
        #loginOverlay { position: fixed; inset: 0; background: var(--sidebar-bg); z-index: 9999; display: flex; justify-content: center; align-items: center; flex-direction: column; }
        .login-box { background: var(--white); padding: 50px 40px; border-radius: 20px; text-align: center; width: 100%; max-width: 340px; box-shadow: var(--shadow-lg); }
        .login-logo { font-size: 2.2rem; font-weight: 900; color: var(--navy); margin: 0 0 20px 0; letter-spacing: -1px; }
        .login-logo span { color: var(--primary); }
        .admin-input { width: 100%; padding: 14px; border: 1.5px solid var(--border); border-radius: 10px; font-family: inherit; font-weight: 600; margin-bottom: 15px; box-sizing: border-box; background: var(--bg-main); color: var(--navy); outline:none; transition:0.2s;}
        .admin-input:focus { border-color: var(--primary); background: var(--white); }
        .btn-solid { padding: 14px; border-radius: 10px; font-weight: 800; border: none; cursor: pointer; width: 100%; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-hover); transform: translateY(-2px); }
        .btn-draft { background: var(--bg-main); border: 1.5px solid var(--border); color: var(--slate); }

        /* Sidebar & Topbar */
        .sidebar { width: 260px; background: var(--sidebar-bg); color: #ffffff; display: flex; flex-direction: column; padding: 30px 20px; box-sizing: border-box; position: fixed; height: 100vh; left: 0; top: 0; }
        .sidebar-logo { font-size: 1.6rem; font-weight: 900; color: #ffffff; letter-spacing: -1px; margin-bottom: 40px; padding-left: 10px; }
        .sidebar-logo span { color: var(--primary); }
        .workspace-tabs { display: flex; flex-direction: column; gap: 6px; flex-grow: 1; }
        .tab-btn { padding: 12px 16px; border: none; background: transparent; cursor: pointer; font-size: 0.9rem; font-weight: 700; color: #94a3b8; text-align: left; border-radius: 10px; }
        .tab-btn.active { background: rgba(37, 99, 235, 0.15); color: var(--primary); border-left: 3px solid var(--primary); }
        .sidebar-footer { padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.05); margin-top: auto; }

        .main-wrapper { margin-left: 260px; width: calc(100% - 260px); display: flex; flex-direction: column; min-height: 100vh; }
        .topbar { background: var(--bg-main); padding: 15px 40px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .analytics-grid { display: flex; gap: 15px; align-items: center; }
        .stat-card { display: flex; flex-direction: column; text-align: right; padding: 10px 18px; border-radius: 12px; border: 1px solid transparent; cursor: pointer; }
        .stat-label { font-size: 0.7rem; font-weight: 800; color: var(--slate-light); text-transform: uppercase; }
        .stat-value { font-size: 1.3rem; font-weight: 900; color: var(--navy); margin-top: 4px; }

        /* Stream & Rows */
        .content-canvas { padding: 40px; flex-grow: 1; display: flex; justify-content: center; }
        .stream-container { width: 100%; max-width: 750px; display: flex; flex-direction: column; gap: 16px; }
        .job-row { background: var(--white); border-radius: 16px; padding: 24px; border: 1px solid var(--border); box-shadow: var(--shadow-sm); }
        .row-emergency { border: 2px solid var(--danger) !important; background: rgba(239, 68, 68, 0.02); animation: redPulse 2s infinite; }
        @keyframes redPulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }

        .row-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .job-id { font-size: 0.8rem; font-weight: 800; color: var(--slate); }
        .status-pill { padding: 6px 12px; border-radius: 50px; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; }
        .pill-inbox { background: var(--pill-inbox-bg); color: var(--pill-inbox-txt); }
        .pill-pipeline { background: var(--pill-pipe-bg); color: var(--pill-pipe-txt); }
        .pill-disp { background: var(--pill-disp-bg); color: var(--pill-disp-txt); }
        .sla-badge { font-size: 0.75rem; font-weight: 800; padding: 4px 10px; border-radius: 8px; border: 1.5px solid var(--border); }
        .sla-danger { background: rgba(239, 68, 68, 0.1); color: var(--danger); border-color: rgba(239, 68, 68, 0.3); }

        .job-title { margin: 0 0 4px 0; font-size: 1.15rem; font-weight: 800; }
        .job-desc { font-size: 0.9rem; color: var(--slate); line-height: 1.5; margin-bottom: 16px; margin-top: 10px; }
        .row-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border); padding-top: 16px; }
        .btn-action { padding: 8px 16px; border-radius: 8px; font-weight: 800; background: var(--bg-main); border: 1.5px solid var(--border); cursor: pointer; color:var(--navy); }

        /* Drawers & Gateway */
        .drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 2000; opacity: 0; pointer-events: none; transition: 0.3s; }
        .drawer-overlay.open { opacity: 1; pointer-events: auto; }
        .drawer-panel { position: fixed; right: 0; top: 0; height: 100vh; width: 100%; max-width: 480px; background: var(--white); z-index: 2001; transform: translateX(100%); transition: 0.3s; display: flex; flex-direction: column; }
        .drawer-panel.open { transform: translateX(0); }
        .drawer-header { padding: 25px 30px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; background: var(--bg-main); }
        .drawer-body { padding: 30px; overflow-y: auto; flex-grow: 1; }
        
        .gateway-box { background: var(--white); padding: 40px; border-radius: 20px; width: 90%; max-width: 400px; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; }

        .admin-section-title { font-size: 0.75rem; font-weight: 900; margin: 0 0 15px 0; text-transform: uppercase; border-bottom: 1.5px dashed var(--border); padding-bottom: 8px; }
        .audit-timeline { margin-top: 15px; padding: 15px; background: var(--bg-main); border-radius: 12px; border: 1px solid var(--border); max-height: 200px; overflow-y: auto; margin-bottom: 30px; }
        .audit-item { font-size: 0.8rem; color: var(--slate); margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px dashed var(--border); display: flex; flex-direction: column; }
        .audit-time { font-weight: 800; color: var(--primary); margin-bottom: 2px; font-size: 0.75rem; }

        /* Financials */
        .fin-metric-box { padding: 18px; border-radius: 14px; background: var(--bg-main); border: 1px solid var(--border); margin-bottom: 12px; }
        .fin-metric-val { font-size: 1.8rem; font-weight: 900; color: var(--navy); margin-top:6px; }

        #toastContainer { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
        .toast { background: #0f172a; color: #ffffff; padding: 14px 24px; border-radius: 50px; font-size: 0.9rem; font-weight: 700; display: flex; gap: 10px; }
    </style>
</head>
<body>

<div id="proofModal" class="drawer-overlay">
    <div class="gateway-box">
        <h3 id="proofTitle" style="color:var(--navy); margin-top:0;">Verification Required</h3>
        <p id="proofDesc" style="color:var(--slate); font-size:0.85rem; margin-bottom:20px;">Upload proof to proceed.</p>
        <input type="number" id="proofAmount" class="admin-input" placeholder="Amount Received (PHP)" required>
        <input type="file" id="proofFile" accept="image/*" class="admin-input" style="padding:10px;" required>
        <div style="display:flex; gap:10px;">
            <button class="btn-solid btn-draft" onclick="closeProofGateway()">Cancel</button>
            <button class="btn-solid btn-primary" id="btnSubmitProof" onclick="submitProof()">Upload & Confirm</button>
        </div>
    </div>
</div>

<div id="loginOverlay">
    <div class="login-box">
        <div class="login-logo">Z<span>connects</span></div>
        <h3 style="margin:0 0 15px 0; color:var(--slate); font-size:1rem;">Command Center</h3>
        
        <input type="text" id="adminUser" class="admin-input" placeholder="Username" style="margin-bottom:10px;">
        <input type="password" id="adminPass" class="admin-input" placeholder="Secure Key" style="margin-bottom:20px;">
        
        <button class="btn-solid btn-primary" onclick="verifyLogin()" id="btnLogin">Authenticate</button>
    </div>
</div>

<div id="appContainer">
    <aside class="sidebar">
        <div class="sidebar-logo">Z<span>connects</span></div>
        <div style="font-size:0.75rem; color:#94a3b8; margin-bottom:20px; padding-left:10px; text-transform:uppercase; font-weight:800;" id="userRoleLabel">Role</div>
        <nav class="workspace-tabs" id="navTabs">
            </nav>
        <div class="sidebar-footer">
            <button class="btn-solid btn-draft" style="background:rgba(255,255,255,0.05); border:none; color:#94a3b8;" onclick="loadJobs(true)">↻ Sync Data</button>
        </div>
    </aside>

    <main class="main-wrapper">
        <header class="topbar">
            <input type="text" id="searchInput" class="admin-input" style="max-width:400px; margin:0; border-radius:50px;" placeholder="Search ID, Name..." oninput="applyFilter()">
            <div class="analytics-grid" id="topbarAnalytics">
                <div class="stat-card"><span class="stat-label">Inbox</span><span class="stat-value" id="stat-inbox">0</span></div>
                <div class="stat-card" onclick="openFinanceDrawer()"><span class="stat-label" style="color: var(--warning);">Pipeline</span><span class="stat-value" id="stat-pipeline" style="color: var(--warning);">₱0</span></div>
            </div>
        </header>

        <div class="content-canvas">
            <div id="streamContainer" class="stream-container">
                <div id="jobsList" style="width: 100%; display: flex; flex-direction: column; gap: 16px;"></div>
                <div id="noResultsMsg" style="display:none; text-align:center; padding: 60px; font-weight:600;">No records found.</div>
            </div>
        </div>
    </main>
</div>

<div id="drawerOverlay" class="drawer-overlay" onclick="closeAllDrawers()"></div>

<div id="manageDrawer" class="drawer-panel">
    <div class="drawer-header"><h2 id="drawerTitle" class="drawer-title">Manage Job</h2><button class="drawer-close" onclick="closeAllDrawers()">✕</button></div>
    <div class="drawer-body">
        <input type="hidden" id="drawerJobId">
        <input type="hidden" id="drawerJobTech">
        
        <div id="drawerDynamicContent"></div>

        <div class="admin-section-title" style="margin-top: 20px;"><span>🕒</span> Official Audit Trail</div>
        <div id="drawerAuditTrail" class="audit-timeline"></div>
    </div>
</div>

<div id="financeDrawer" class="drawer-panel">
    <div class="drawer-header"><h2 class="drawer-title">📊 Financial Insights</h2><button class="drawer-close" onclick="closeAllDrawers()">✕</button></div>
    <div class="drawer-body">
        <div class="admin-section-title" style="color: var(--success);"><span>💰</span> Realized Revenue</div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-bottom:15px;">
            <div class="fin-metric-box"><div style="font-size:0.75rem; font-weight:800; color:var(--slate);">Gross</div><div class="fin-metric-val" id="fin-gross">₱0</div></div>
            <div class="fin-metric-box"><div style="font-size:0.75rem; font-weight:800; color:var(--slate);">Costs</div><div class="fin-metric-val" id="fin-costs" style="color: var(--danger);">₱0</div></div>
        </div>
        <div class="fin-metric-box" style="border-color: var(--success);"><div style="font-size:0.75rem; font-weight:800; color:var(--success);">Net Profit</div><div class="fin-metric-val" id="fin-net" style="color: var(--success);">₱0</div></div>
    </div>
</div>

<div id="toastContainer"></div>

<script>
    // 🛑 REPLACE THIS URL WITH YOUR NEW DEPLOYMENT URL
    const CONFIG = { APP_URL: 'https://script.google.com/macros/s/AKfycbw3c915eKVYlXdYhva6ZtlNDXOahN7nXWrht_PPQKYfHf6Su_jgmTOSs4dlqeEZbxvsxA/exec' };
    
    const STATE = { pass: '', role: '', techName: '', workspace: 'all', jobsData: [] };
    let pendingAction = null;

    function showToast(msg, type = 'info') {
        const c = document.getElementById('toastContainer');
        const t = document.createElement('div'); t.className = `toast toast-${type}`;
        t.innerHTML = `<span>${type === 'success' ? '✅' : '⚠️'}</span> <span>${msg}</span>`;
        c.appendChild(t); setTimeout(() => t.remove(), 3000);
    }

    async function verifyLogin() {
        STATE.pass = document.getElementById('adminPass').value;
        const btn = document.getElementById('btnLogin'); btn.innerText = "Authenticating...";

        try {
            const res = await fetch(CONFIG.APP_URL, { method: 'POST', body: JSON.stringify({ action: 'get_admin_data', password: STATE.pass }) });
            const data = await res.json();

            if(data.error) { showToast("Invalid Key", "error"); btn.innerText = "Authenticate"; return; }
            
            STATE.role = data.userRole; 
            STATE.techName = data.techName || '';
            STATE.jobsData = data.jobs;
            
            document.getElementById('userRoleLabel').innerText = `Role: ${STATE.role}`;
            buildNavMenu();

            if (STATE.role !== 'Technician' && data.metrics) {
                document.getElementById('stat-inbox').innerText = data.metrics.inboxCount;
                document.getElementById('stat-pipeline').innerText = '₱' + data.metrics.pipeTotal.toLocaleString('en-PH');
                document.getElementById('fin-gross').innerText = '₱' + data.metrics.gross.toLocaleString('en-PH');
                document.getElementById('fin-costs').innerText = '₱' + data.metrics.cost.toLocaleString('en-PH');
                document.getElementById('fin-net').innerText = '₱' + data.metrics.net.toLocaleString('en-PH');
            } else {
                document.getElementById('topbarAnalytics').style.display = 'none';
            }

            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('appContainer').classList.add('authenticated');
            showToast(`Connected: ${STATE.role}`, "success");
            renderStream();
        } catch (err) { showToast("Network Error", "error"); btn.innerText = "Authenticate"; }
    }

    async function loadJobs(feedback = false) {
        const res = await fetch(CONFIG.APP_URL, { method: 'POST', body: JSON.stringify({ action: 'get_admin_data', password: STATE.pass }) });
        const data = await res.json();
        if(!data.error) { STATE.jobsData = data.jobs; renderStream(); if(feedback) showToast("Synced", "success"); }
    }

    function buildNavMenu() {
        const nav = document.getElementById('navTabs');
        if (STATE.role === 'Technician') {
            nav.innerHTML = `
                <button class="tab-btn active" onclick="setWorkspace('all', this)">📋 Job Board (Available)</button>
                <button class="tab-btn" onclick="setWorkspace('my_jobs', this)">🛠️ My Active Jobs</button>
            `;
            STATE.workspace = 'all';
        } else {
            nav.innerHTML = `
                <button class="tab-btn active" onclick="setWorkspace('inbox', this)">📥 Inbox</button>
                <button class="tab-btn" onclick="setWorkspace('pipeline', this)">⚡ Quoted/Claims</button>
                <button class="tab-btn" onclick="setWorkspace('dispatched', this)">🚀 Dispatched</button>
                <button class="tab-btn" onclick="setWorkspace('all', this)">🗄️ All Records</button>
            `;
            STATE.workspace = 'inbox';
        }
    }

    function setWorkspace(ws, btn) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active'); STATE.workspace = ws; applyFilter();
    }

    function applyFilter() {
        const term = document.getElementById('searchInput').value.toLowerCase().trim();
        const rows = document.querySelectorAll('.job-row');
        let count = 0;
        rows.forEach(r => {
            let show = false;
            const status = r.dataset.status.toLowerCase();
            const tech = r.dataset.tech;

            if (STATE.role === 'Technician') {
                if (STATE.workspace === 'all' && tech === '') show = true; // Job Board
                if (STATE.workspace === 'my_jobs' && (tech === STATE.techName || status.includes(STATE.techName.toLowerCase()))) show = true;
            } else {
                if (STATE.workspace === 'all') show = true;
                else if (STATE.workspace === 'inbox' && (status.includes('pending') || status.includes('emergency'))) show = true;
                else if (STATE.workspace === 'pipeline' && (status.includes('quote') || status.includes('claim') || status.includes('receive'))) show = true;
                else if (STATE.workspace === 'dispatched' && status.includes('dispatch')) show = true;
            }

            if (show && r.innerText.toLowerCase().includes(term)) { r.style.display = "block"; count++; } 
            else r.style.display = "none";
        });
        document.getElementById('noResultsMsg').style.display = count === 0 ? 'block' : 'none';
    }

    function renderStream() {
        const list = document.getElementById('jobsList'); list.innerHTML = '';
        STATE.jobsData.forEach(job => {
            const isEmergency = String(job.status).includes("EMERGENCY");
            let pillClass = 'pill-inbox';
            if(job.status.includes('Claim') || job.status.includes('Quote')) pillClass = 'pill-pipe';
            if(job.status.includes('Dispatch')) pillClass = 'pill-disp';

            const row = document.createElement('div');
            row.className = isEmergency ? 'job-row row-emergency' : 'job-row';
            row.dataset.status = job.status; row.dataset.tech = job.tech;
            
            row.innerHTML = `
                <div class="row-header">
                    <div><span class="job-id">${job.id}</span> <span class="status-pill ${pillClass}">${job.status}</span></div>
                    ${isEmergency ? '<span class="sla-badge sla-danger">URGENT</span>' : ''}
                </div>
                <h3 class="job-title">${job.name}</h3>
                <div style="font-size:0.85rem; color:var(--slate); margin-bottom:10px;"><b>Loc:</b> ${job.location} • <b>Cat:</b> ${job.category}</div>
                <div class="job-desc">${job.desc}</div>
                <div class="row-footer">
                    <div style="font-size:0.8rem; font-weight:700; color:var(--purple);">${job.tech ? `Assigned: ${job.tech}` : ''}</div>
                    <button class="btn-action" onclick="openDrawer('${job.id}')">⚙️ Open Action Panel</button>
                </div>
            `;
            list.appendChild(row);
        });
        applyFilter();
    }

    function openDrawer(id) {
        const job = STATE.jobsData.find(j => j.id === id);
        if(!job) return;

        document.getElementById('drawerTitle').innerText = `Panel: ${job.id}`;
        document.getElementById('drawerJobId').value = job.id;
        document.getElementById('drawerJobTech').value = job.tech; // Current tech

        const content = document.getElementById('drawerDynamicContent');
        content.innerHTML = ''; // Clear

        // --- ROLE BASED UI RENDERING ---
        if (STATE.role === 'Technician') {
            if (job.tech === "") {
                content.innerHTML = `
                    <div class="admin-section-title"><span>✋</span> Job Board Action</div>
                    <p style="font-size:0.9rem; color:var(--slate); margin-bottom:20px;">Review the location and issue. If you have the tools, claim this job to request dispatch.</p>
                    <button class="btn-solid" style="background:var(--purple); color:white;" onclick="executeAction('claim_job')">Claim Job & Request Dispatch</button>
                `;
            } else {
                content.innerHTML = `
                    <div class="admin-section-title"><span>✅</span> Active Job Execution</div>
                    <p style="font-size:0.9rem; color:var(--slate); margin-bottom:20px;">Once repairs are complete, upload the after-photo and collect payment.</p>
                    <button class="btn-solid btn-primary" style="background:var(--success);" onclick="openProofGateway('mark_complete')">Complete Job & Upload Proof</button>
                `;
            }
        } else {
            // ADMIN / DISPATCHER VIEW
            let adminUI = `
                <div class="admin-section-title"><span>📝</span> Phase 1: Quoting</div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                    <input type="number" id="drawerPrice" class="admin-input" placeholder="Quote (PHP)" value="${job.price}">
                    <input type="number" id="drawerCost" class="admin-input" placeholder="Cost (PHP)" value="${job.cost}">
                </div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:20px;">
                    <button class="btn-solid btn-draft" onclick="executeAction('save_draft')">💾 Save Draft</button>
                    <button class="btn-solid btn-primary" onclick="executeAction('save_and_send_quote')">📧 Send Quote</button>
                </div>
            `;

            if (job.status.includes('Claim Pending')) {
                // Someone claimed it. Admin must approve.
                const claimer = job.status.split(':')[1].trim();
                adminUI += `
                    <div class="admin-section-title" style="color:var(--purple); border-bottom-color:var(--purple);"><span>🛡️</span> Tech Claim Approval</div>
                    <div style="background:rgba(139, 92, 246, 0.1); padding:15px; border-radius:10px; margin-bottom:20px; text-align:center;">
                        <p style="margin:0 0 15px 0; font-weight:700; color:var(--navy);">Tech <b>${claimer}</b> wants to take this job.</p>
                        <button class="btn-solid" style="background:var(--purple); color:white;" onclick="executeAction('approve_claim', '${claimer}')">Approve Dispatch & Notify Client</button>
                    </div>
                `;
            } else {
                // Standard Dispatch Tools
                adminUI += `
                    <div class="admin-section-title"><span>🚀</span> Phase 2: Dispatch</div>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:20px;">
                        <button class="btn-solid" style="background:rgba(245, 158, 11, 0.1); color:var(--warning); border:1.5px solid rgba(245, 158, 11, 0.3);" onclick="openProofGateway('verify_dp')">💳 Verify DP</button>
                        <button class="btn-solid btn-primary" style="background:var(--success);" onclick="openProofGateway('mark_complete')">Mark Complete (Ledger)</button>
                    </div>
                `;
            }
            content.innerHTML = adminUI;
        }

        // Render History
        const auditCont = document.getElementById('drawerAuditTrail');
        if (job.history) {
            auditCont.innerHTML = job.history.split('\n').filter(l => l.trim() !== '').map(line => {
                const match = line.match(/^\[(.*?)\] (.*)$/);
                if (match) return `<div class="audit-item"><span class="audit-time">${match[1]}</span><span>${match[2]}</span></div>`;
                return `<div class="audit-item"><span>${line}</span></div>`;
            }).reverse().join('');
        } else { auditCont.innerHTML = '<div class="audit-item">No history.</div>'; }

        document.getElementById('drawerOverlay').classList.add('open');
        document.getElementById('manageDrawer').classList.add('open');
    }

    function closeAllDrawers() { document.getElementById('manageDrawer').classList.remove('open'); document.getElementById('financeDrawer').classList.remove('open'); document.getElementById('drawerOverlay').classList.remove('open'); }
    function openFinanceDrawer() { if(STATE.role !== 'Technician') { document.getElementById('drawerOverlay').classList.add('open'); document.getElementById('financeDrawer').classList.add('open'); } }

    // --- Hard-Stop Gateway ---
    function openProofGateway(action) {
        pendingAction = action;
        document.getElementById('proofTitle').innerText = action === 'verify_dp' ? "DP Verification" : "Final Completion";
        document.getElementById('proofDesc').innerText = action === 'verify_dp' ? "Attach DP receipt." : "Attach final payment receipt/photo.";
        document.getElementById('proofAmount').value = ''; document.getElementById('proofFile').value = '';
        document.getElementById('proofModal').classList.add('open');
    }
    function closeProofGateway() { document.getElementById('proofModal').classList.remove('open'); }

    const toBase64 = file => new Promise((res, rej) => { const r = new FileReader(); r.readAsDataURL(file); r.onload = () => res(r.result); r.onerror = e => rej(e); });

    async function submitProof() {
        const amt = document.getElementById('proofAmount').value;
        const file = document.getElementById('proofFile').files[0];
        if (!amt || !file) return alert("Amount and File are mandatory.");
        
        const btn = document.getElementById('btnSubmitProof'); btn.innerText = "Uploading..."; btn.disabled = true;

        try {
            const b64 = await toBase64(file);
            await sendPayload({ action: pendingAction, bookingId: document.getElementById('drawerJobId').value, amount: amt, base64Image: b64 });
            closeProofGateway();
        } catch(err) { alert("Upload Failed."); }
        btn.innerText = "Upload & Confirm"; btn.disabled = false;
    }

    // --- Action Execution ---
    async function executeAction(action, targetTech = null) {
        const p = { action: action, bookingId: document.getElementById('drawerJobId').value };
        if (STATE.role !== 'Technician') {
            p.price = document.getElementById('drawerPrice') ? document.getElementById('drawerPrice').value : '';
            p.cost = document.getElementById('drawerCost') ? document.getElementById('drawerCost').value : '';
        }
        if (action === 'approve_claim') p.tech = targetTech;
        await sendPayload(p);
    }

    async function sendPayload(payload) {
        payload.password = STATE.pass;
        closeAllDrawers(); showToast("Processing...", "info");
        const res = await fetch(CONFIG.APP_URL, { method: 'POST', body: JSON.stringify(payload) });
        const data = await res.json();
        if(!data.error) { showToast("Success!", "success"); loadJobs(); } else showToast(data.error, "error");
    }
</script>
</body>
</html>
