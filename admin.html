<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' https: 'unsafe-inline' 'unsafe-eval' data:;">
    
    <title>ZConnects Manager | V11 Enterprise</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        /* CORE STYLES */
        :root { --primary: #2563eb; --navy: #0f172a; --slate: #64748b; --light: #f8fafc; --white: #ffffff; --border: #e2e8f0; --success: #16a34a; --warning: #f59e0b; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--light); margin: 0; color: var(--navy); }
        
        /* LOGIN STYLES */
        #loginOverlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px); z-index: 9999; display: flex; justify-content: center; align-items: center; flex-direction: column; }
        .login-box { background: var(--white); padding: 50px 40px; border-radius: 30px; text-align: center; width: 100%; max-width: 320px; box-shadow: 0 25px 50px rgba(0,0,0,0.25); animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes popIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .login-logo { font-size: 2rem; font-weight: 900; color: var(--navy); margin: 0 0 20px 0; letter-spacing: -1px; }
        .login-logo span { color: var(--primary); }
        .login-input { width: 100%; padding: 16px; margin: 15px 0; border: 2px solid var(--border); border-radius: 14px; font-size: 1rem; box-sizing: border-box; transition: 0.3s; background: var(--light); font-family: inherit; }
        .login-input:focus { border-color: var(--primary); outline: none; background: var(--white); box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }
        .login-btn { background: var(--primary); color: white; width: 100%; padding: 16px; border: none; border-radius: 14px; font-weight: 800; font-size: 1rem; cursor: pointer; transition: 0.3s; box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2); }
        .login-btn:hover { transform: translateY(-2px); box-shadow: 0 15px 25px rgba(37, 99, 235, 0.3); }
        .trust-badge { font-size: 0.75rem; color: var(--slate); margin-top: 20px; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 5px; }

        /* HEADER & FILTER BAR */
        .admin-header { padding: 20px 5%; background: var(--white); border-bottom: 1px solid var(--border); position: sticky; top:0; z-index: 100; box-shadow: 0 4px 20px rgba(15, 23, 42, 0.03); }
        .header-content { max-width: 1200px; margin: 0 auto; display: flex; flex-direction: column; gap: 15px; }
        .top-row { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-weight: 900; font-size: 1.8rem; color: var(--navy); letter-spacing: -1px; }
        .logo span { color: var(--primary); }
        
        .filter-bar { display: flex; gap: 10px; flex-wrap: wrap; }
        .search-input { padding: 12px 20px; border: 2px solid transparent; background: #f1f5f9; border-radius: 50px; font-size: 0.95rem; flex: 1; min-width: 200px; transition: 0.3s; outline: none; font-family: inherit; }
        .search-input:focus { border-color: var(--primary); background: var(--white); box-shadow: 0 5px 15px rgba(37, 99, 235, 0.1); }
        .filter-btn { padding: 10px 20px; border: 1px solid var(--border); background: var(--white); border-radius: 50px; cursor: pointer; font-size: 0.9rem; font-weight: 700; color: var(--slate); transition: 0.3s; }
        .filter-btn.active { background: var(--navy); color: white; border-color: var(--navy); box-shadow: 0 5px 15px rgba(15, 23, 42, 0.15); }
        .filter-btn:hover:not(.active) { background: #f1f5f9; transform: translateY(-1px); }

        /* JOB CARDS */
        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .jobs-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(450px, 1fr)); gap: 35px; }
        .job-card { background: var(--white); border-radius: 24px; padding: 30px; border: 1px solid var(--border); box-shadow: 0 15px 35px rgba(15, 23, 42, 0.04); position: relative; transition: transform 0.3s ease; }
        .job-card:hover { transform: translateY(-4px); box-shadow: 0 25px 45px rgba(15, 23, 42, 0.08); border-color: var(--primary); }
        
        .delete-btn { position: absolute; top: 25px; right: 25px; color: #ef4444; background: #fee2e2; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: none; font-size: 1.2rem; transition: 0.2s; }
        .delete-btn:hover { background: #ef4444; color: white; transform: scale(1.1); }

        .card-header { margin-bottom: 15px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .job-id { background: #f1f5f9; padding: 6px 10px; border-radius: 8px; font-size: 0.85rem; font-weight: 800; color: var(--slate); }
        .status-pill { padding: 6px 12px; border-radius: 50px; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; background: #e2e8f0; letter-spacing: 0.5px; color: var(--navy); }
        
        /* PIPELINE UI */
        .pipeline-track { display: flex; justify-content: space-between; background: #f1f5f9; border-radius: 12px; padding: 10px; margin-bottom: 25px; font-size: 0.75rem; font-weight: 800; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; position: relative; }
        .pipeline-step { flex: 1; text-align: center; position: relative; z-index: 2; }
        .pipeline-step.active { color: var(--primary); }
        .pipeline-step.completed { color: var(--success); }

        /* CONTROLS */
        .admin-controls { margin-top: 20px; }
        .form-section { background: var(--light); padding: 20px; border-radius: 16px; border: 1px solid var(--border); margin-bottom: 20px; }
        .control-label { font-size: 0.75rem; font-weight: 800; color: var(--slate); margin-bottom: 8px; display: block; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .admin-input { width: 100%; padding: 12px 14px; border: 2px solid var(--border); border-radius: 10px; font-family: inherit; font-size: 0.95rem; box-sizing: border-box; transition: 0.3s; background: var(--white); }
        .admin-input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }
        
        .action-group { display: flex; flex-direction: column; gap: 10px; }
        .btn-primary { background: var(--primary); color: white; width: 100%; padding: 14px; border: none; border-radius: 10px; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 15px rgba(37, 99, 235, 0.2); }
        
        .btn-secondary { background: var(--white); border: 2px solid var(--border); color: var(--navy); width: 100%; padding: 12px; border-radius: 10px; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .btn-secondary:hover { border-color: var(--navy); }

        .btn-dp { background: #fef08a; color: #92400e; border: 1px solid #fcd34d; width: 100%; padding: 12px; border-radius: 10px; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .btn-dp:hover { background: #fde047; transform: translateY(-1px); }

        .btn-complete { background: #dcfce7; color: #166534; width: 100%; padding: 14px; border: none; border-radius: 10px; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .btn-complete:hover { background: #bbf7d0; }

        /* SPINNER */
        .loader-spinner { display: inline-block; width: 40px; height: 40px; border: 4px solid rgba(37, 99, 235, 0.2); border-radius: 50%; border-top-color: var(--primary); animation: spin 1s ease-in-out infinite; margin-bottom: 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-box">
        <div class="login-logo">Z<span>connects</span></div>
        <h3 style="margin:0 0 15px 0; color:var(--slate); font-size:1rem;">Admin Portal</h3>
        <input type="password" id="adminPass" class="login-input" placeholder="Enter Secure Password">
        <button class="login-btn" onclick="verifyLogin()">Unlock Dashboard</button>
        <div class="trust-badge">🔒 256-bit Encrypted Connection</div>
        <p id="loginError" style="color:#ef4444; display:none; margin-top:15px; font-size:0.85rem; font-weight:700;">Incorrect Password</p>
    </div>
</div>

<header class="admin-header">
    <div class="header-content">
        <div class="top-row">
            <div class="logo">Zconnects <span>Manager</span></div>
            <button onclick="loadJobs(currentPass)" style="border:none; background:none; color:var(--primary); font-weight:800; font-size:0.95rem; cursor:pointer; display:flex; align-items:center; gap:5px; transition:0.2s;" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">↻ Refresh</button>
        </div>
        <div class="filter-bar">
            <input type="text" id="searchInput" class="search-input" placeholder="Search name, ID, or category..." onkeyup="applyFilter()">
            <button class="filter-btn active" onclick="setFilter('all', this)">All Jobs</button>
            <button class="filter-btn" onclick="setFilter('pending', this)">Pending Review</button>
            <button class="filter-btn" onclick="setFilter('quoted', this)">Quote Sent</button>
            <button class="filter-btn" onclick="setFilter('assigned', this)">Dispatched</button>
            <button class="filter-btn" onclick="setFilter('completed', this)">Completed</button>
        </div>
    </div>
</header>

<div class="container">
    <div id="loader" style="text-align:center; padding:60px 20px; display:none;">
        <div class="loader-spinner"></div>
        <div style="color:var(--slate); font-weight:700;">Decrypting secure data...</div>
    </div>
    <div id="jobsGrid" class="jobs-grid"></div>
    <div id="noResultsMsg" style="display:none; text-align:center; color:var(--slate); width:100%; padding: 40px; background:white; border-radius:20px; border:1px dashed var(--border); font-weight:600;">No jobs found matching your filters.</div>
</div>

<script>
    const APP_URL = 'https://script.google.com/macros/s/AKfycbw3c915eKVYlXdYhva6ZtlNDXOahN7nXWrht_PPQKYfHf6Su_jgmTOSs4dlqeEZbxvsxA/exec';
    
    let currentPass = '';
    let activeCategory = 'all'; 

    async function verifyLogin() {
        const pass = document.getElementById('adminPass').value;
        const loginBtn = document.querySelector('.login-btn');
        loginBtn.innerText = "Verifying securely...";

        try {
            const response = await fetch(`${APP_URL}?action=get_admin_data`, {
                method: 'POST',
                body: JSON.stringify({ action: 'get_admin_data', password: pass }) 
            });
            const jobs = await response.json();

            if(jobs.error) { 
                document.getElementById('loginError').style.display = 'block';
                loginBtn.innerText = "Unlock Dashboard";
                return; 
            }
            
            currentPass = pass;
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('loginError').style.display = 'none';
            renderJobs(jobs);

        } catch (err) { 
            alert("Connection Error. Please check your network.");
            loginBtn.innerText = "Unlock Dashboard";
        }
    }

    async function loadJobs(password) {
        document.getElementById('loader').style.display = 'block';
        document.getElementById('jobsGrid').innerHTML = '';
        document.getElementById('noResultsMsg').style.display = 'none';

        try {
            const response = await fetch(`${APP_URL}?action=get_admin_data`, {
                method: 'POST',
                body: JSON.stringify({ action: 'get_admin_data', password: password }) 
            });
            const jobs = await response.json();

            document.getElementById('loader').style.display = 'none';

            if(jobs.error) { 
                alert("Session Expired or Access Denied"); 
                location.reload(); 
                return; 
            }
            
            renderJobs(jobs);

        } catch (err) { 
            alert("Connection Error. Please refresh.");
            document.getElementById('loader').style.display = 'none';
        }
    }

    function getCategory(status) {
        status = (status || "").toLowerCase();
        if (status.includes('cancelled')) return 'cancelled'; 
        if (status.includes('completed') || status.includes('done') || status.includes('paid')) return 'completed';
        if (status.includes('quote')) return 'quoted';
        if (status.includes('assigned') || status.includes('dispatch') || status.includes('ready')) return 'assigned';
        return 'pending'; 
    }

    function renderJobs(jobs) {
        const grid = document.getElementById('jobsGrid');
        grid.innerHTML = '';

        if (!jobs || jobs.length === 0) {
            document.getElementById('noResultsMsg').style.display = 'block';
            return;
        }

        jobs.forEach(job => {
            const categoryTag = getCategory(job.status);
            const searchText = `${job.id} ${job.name} ${job.status} ${job.category}`.toLowerCase();
            
            // Calculate Pipeline Step
            let step = 1;
            if (categoryTag === 'quoted') step = 2;
            if (categoryTag === 'assigned') step = 3;
            if (categoryTag === 'completed') step = 4;

            const card = document.createElement('div');
            card.className = 'job-card';
            card.dataset.category = categoryTag;
            card.dataset.search = searchText;

            card.innerHTML = `
                <button class="delete-btn" onclick="cancelJob('${escapeHTML(job.id)}')" title="Cancel Booking">×</button>
                
                <div class="card-header">
                    <span class="job-id">${escapeHTML(job.id)}</span>
                    <span class="status-pill">${escapeHTML(job.status)}</span>
                </div>
                
                <div class="pipeline-track">
                    <div class="pipeline-step ${step >= 1 ? (step > 1 ? 'completed' : 'active') : ''}">1. Review</div>
                    <div class="pipeline-step ${step >= 2 ? (step > 2 ? 'completed' : 'active') : ''}">2. Quoted</div>
                    <div class="pipeline-step ${step >= 3 ? (step > 3 ? 'completed' : 'active') : ''}">3. Dispatched</div>
                    <div class="pipeline-step ${step >= 4 ? 'completed' : ''}">4. Done</div>
                </div>

                <h3 style="margin:0 0 8px 0; color:var(--navy); font-size:1.4rem; font-weight:800; letter-spacing:-0.5px;">${escapeHTML(job.name)}</h3>
                <div style="color:var(--primary); font-weight:800; font-size:0.95rem; margin-bottom:15px; text-transform:uppercase; letter-spacing:0.5px;">${escapeHTML(job.category)} | <span style="color:var(--slate);">${escapeHTML(job.urgency)}</span></div>
                <div style="background:var(--white); border: 1px solid var(--border); padding:15px; border-radius:12px; font-size:0.95rem; color:var(--slate); margin-bottom:15px; line-height:1.5;">${escapeHTML(job.desc)}</div>
                ${job.photo && job.photo !== 'No Photo' ? `<a href="${job.photo}" target="_blank" style="display:inline-block; background:#eff6ff; color:var(--primary); font-weight:800; padding:8px 16px; border-radius:8px; text-decoration:none; font-size:0.85rem; margin-bottom:15px; transition:0.2s;" onmouseover="this.style.background='#dbeafe'" onmouseout="this.style.background='#eff6ff'">📸 View Attached Photo</a>` : ''}

                <div class="admin-controls">
                    <div class="form-section">
                        <div class="input-grid">
                            <div>
                                <label class="control-label">Quote Price (PHP)</label>
                                <input type="number" id="price-${job.id}" class="admin-input" placeholder="e.g. 3500" value="${escapeHTML(job.price || '')}">
                            </div>
                            <div>
                                <label class="control-label">Actual Cost (PHP)</label>
                                <input type="number" id="cost-${job.id}" class="admin-input" placeholder="e.g. 1500" value="${escapeHTML(job.cost || '')}">
                            </div>
                        </div>
                        
                        <label class="control-label">Engineer Notes (Internal)</label>
                        <input type="text" id="notes-${job.id}" class="admin-input" style="margin-bottom:15px;" placeholder="Technical details, materials needed..." value="${escapeHTML(job.notes || '')}">
                        
                        <label class="control-label">Assign Technician</label>
                        <select id="tech-${job.id}" class="admin-input">
                            <option value="">-- Select Tech --</option>
                            <option value="Jasper Jubay" ${job.tech === 'Jasper Jubay' ? 'selected' : ''}>Jasper Jubay</option>
                            <option value="Francis Intong" ${job.tech === 'Francis Intong' ? 'selected' : ''}>Francis Intong</option>
                            <option value="Jeffrey Canete" ${job.tech === 'Jeffrey Canete' ? 'selected' : ''}>Jeffrey Canete</option>
                            <option value="Jerome" ${job.tech === 'Jerome' ? 'selected' : ''}>Jerome</option>
                            <option value="Lyndon Alburo" ${job.tech === 'Lyndon Alburo' ? 'selected' : ''}>Lyndon Alburo</option>
                        </select>
                    </div>

                    <div class="action-group">
                        <div style="display:flex; gap:10px;">
                            <button class="btn-secondary" style="flex:1;" onclick="saveDraft('${job.id}')">💾 Save Details</button>
                            <button class="btn-dp" style="flex:1; margin:0;" onclick="updateStatus('${job.id}', 'DP Received - Ready for Dispatch')">💳 Verify DP</button>
                        </div>
                        
                        <button class="btn-primary" onclick="sendQuote('${job.id}')">📧 Send Official Quote (PDF)</button>
                        
                        <div style="display:flex; gap:10px; margin-top:5px;">
                            <button class="btn-secondary" style="flex:1;" onclick="assignTechStatus('${job.id}')">🚀 Deploy Tech</button>
                            <button class="btn-complete" style="flex:1; margin:0;" onclick="updateStatus('${job.id}', 'Job Completed')">✅ Mark Completed</button>
                        </div>
                    </div>
                </div>
            `;
            grid.appendChild(card);
        });
        
        applyFilter(); 
    }

    function setFilter(category, btn) {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeCategory = category;
        applyFilter();
    }

    function applyFilter() {
        const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
        const cards = document.querySelectorAll('.job-card');
        let visibleCount = 0;

        cards.forEach(card => {
            const cardCategory = card.dataset.category;
            const cardSearchText = card.dataset.search;
            
            const categoryMatch = (activeCategory === 'all' && cardCategory !== 'cancelled') || (activeCategory === cardCategory);
            const searchMatch = cardSearchText.includes(searchTerm);

            if (categoryMatch && searchMatch) {
                card.style.display = "block";
                visibleCount++;
            } else {
                card.style.display = "none";
            }
        });

        const msg = document.getElementById('noResultsMsg');
        msg.style.display = (visibleCount === 0 && cards.length > 0) ? 'block' : 'none';
    }

    function escapeHTML(str) {
        if (!str) return "";
        return str.toString().replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
    }

    async function cancelJob(id) {
        if(!confirm(`⚠️ CANCEL BOOKING ${id}?\n\nThis will mark it as cancelled.`)) return;
        const res = await sendAction({ action: 'cancel_booking', bookingId: id });
        if(!res.error) loadJobs(currentPass);
    }

    async function saveDraft(id) {
        const price = document.getElementById(`price-${id}`).value;
        const cost = document.getElementById(`cost-${id}`).value;
        const notes = document.getElementById(`notes-${id}`).value;
        const tech = document.getElementById(`tech-${id}`).value;
        
        const btn = event.target;
        btn.innerText = "Saving...";
        const res = await sendAction({ action: 'save_draft', bookingId: id, price: price, cost: cost, notes: notes, tech: tech });
        btn.innerText = "💾 Save Details";
        if(!res.error) alert("Details securely saved!");
    }

    async function sendQuote(id) {
        const price = document.getElementById(`price-${id}`).value;
        const cost = document.getElementById(`cost-${id}`).value;
        const notes = document.getElementById(`notes-${id}`).value;
        const tech = document.getElementById(`tech-${id}`).value;
        
        if(!price) return alert("Please enter a quote price before sending.");
        if(!confirm(`Send official quote of ₱${price} to the client?`)) return;
        
        const btn = event.target;
        btn.innerText = "Encrypting & Sending...";
        const res = await sendAction({ action: 'save_and_send_quote', bookingId: id, price: price, cost: cost, notes: notes, tech: tech });
        if(!res.error) {
            alert("Quote successfully sent to client!");
            loadJobs(currentPass);
        } else {
            btn.innerText = "📧 Send Official Quote (PDF)";
        }
    }

    async function updateStatus(id, status) {
        if(!confirm(`Update job status to: ${status}?`)) return;
        const res = await sendAction({ action: 'update_status', bookingId: id, newStatus: status });
        if(!res.error) loadJobs(currentPass);
    }

    async function assignTechStatus(id) {
        const tech = document.getElementById(`tech-${id}`).value;
        if(!tech) {
            alert("Please select a technician from the dropdown menu first.");
            return;
        }
        if(!confirm(`Deploy ${tech} for this job?`)) return;
        
        await sendAction({ 
            action: 'save_draft', 
            bookingId: id, 
            price: document.getElementById(`price-${id}`).value, 
            cost: document.getElementById(`cost-${id}`).value, 
            notes: document.getElementById(`notes-${id}`).value, 
            tech: tech 
        });
        
        const res = await sendAction({ action: 'update_status', bookingId: id, newStatus: `Dispatched: ${tech}` });
        if(!res.error) loadJobs(currentPass);
    }

    async function sendAction(payload) {
        payload.password = currentPass; 
        try {
            const response = await fetch(APP_URL, {
                method: 'POST',
                body: JSON.stringify(payload)
            });
            const data = await response.json();
            if(data.error) {
                alert("Error: " + data.error);
                if(data.error.includes("Unauthorized")) location.reload();
            }
            return data;
        } catch(err) {
            console.error(err);
            alert("Network error processing request.");
            return { error: "Network Error" };
        }
    }
</script>

</body>
</html>
