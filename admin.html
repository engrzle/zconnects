<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' https: 'unsafe-inline' 'unsafe-eval' data:;">
    
    <title>ZConnects Enterprise | Command Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        /* CORE ENTERPRISE STYLES (Light & Dark Theme Variables) */
        :root { 
            --primary: #2563eb; --primary-hover: #1d4ed8;
            --success: #10b981; --warning: #f59e0b; --danger: #ef4444; --purple: #8b5cf6;
            
            /* Light Theme Defaults */
            --bg-main: #f8fafc; 
            --white: #ffffff; 
            --navy: #0f172a; 
            --slate: #64748b; 
            --slate-light: #94a3b8; 
            --border: #e2e8f0; 
            --sidebar-bg: #020617; 
            
            /* Shadows */
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
            
            /* Semantic Pills (Light) */
            --pill-inbox-bg: #eff6ff; --pill-inbox-txt: #1e3a8a;
            --pill-pipe-bg: #fffbeb; --pill-pipe-txt: #92400e;
            --pill-disp-bg: #f3e8ff; --pill-disp-txt: #581c87;
            --pill-comp-bg: #ecfdf5; --pill-comp-txt: #065f46;
            --pill-arch-bg: #f1f5f9; --pill-arch-txt: #475569;
        }

        /* Dark Theme Overrides */
        [data-theme="dark"] {
            --bg-main: #0f172a; 
            --white: #1e293b; 
            --navy: #f8fafc; 
            --slate: #cbd5e1; 
            --slate-light: #64748b; 
            --border: #334155; 
            --sidebar-bg: #020617;
            
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.5);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.5), 0 2px 4px -2px rgb(0 0 0 / 0.5);
            --shadow-lg: 0 20px 25px -5px rgb(0 0 0 / 0.5), 0 8px 10px -6px rgb(0 0 0 / 0.5);

            --pill-inbox-bg: rgba(37, 99, 235, 0.2); --pill-inbox-txt: #60a5fa;
            --pill-pipe-bg: rgba(245, 158, 11, 0.2); --pill-pipe-txt: #fbbf24;
            --pill-disp-bg: rgba(139, 92, 246, 0.2); --pill-disp-txt: #c084fc;
            --pill-comp-bg: rgba(16, 185, 129, 0.2); --pill-comp-txt: #34d399;
            --pill-arch-bg: rgba(148, 163, 184, 0.2); --pill-arch-txt: #94a3b8;
        }

        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg-main); margin: 0; color: var(--navy); display: flex; min-height: 100vh; overflow-x: hidden; transition: background-color 0.3s, color 0.3s; }
        
        /* APP CONTAINER (Hidden initially for security) */
        #appContainer { display: none; width: 100%; flex-direction: row; }
        #appContainer.authenticated { display: flex; }

        /* LOGIN OVERLAY */
        #loginOverlay { position: fixed; inset: 0; background: var(--sidebar-bg); z-index: 9999; display: flex; justify-content: center; align-items: center; flex-direction: column; }
        .login-box { background: var(--white); padding: 50px 40px; border-radius: 20px; text-align: center; width: 100%; max-width: 340px; box-shadow: var(--shadow-lg); animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes popIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .login-logo { font-size: 2.2rem; font-weight: 900; color: var(--navy); margin: 0 0 20px 0; letter-spacing: -1px; }
        .login-logo span { color: var(--primary); }
        .login-input { width: 100%; padding: 16px; margin: 15px 0; border: 1.5px solid var(--border); border-radius: 12px; font-size: 1rem; box-sizing: border-box; transition: 0.2s; background: var(--bg-main); font-family: inherit; font-weight: 600; color: var(--navy); }
        .login-input:focus { border-color: var(--primary); outline: none; background: var(--white); box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }
        .login-btn { background: var(--primary); color: #ffffff; width: 100%; padding: 16px; border: none; border-radius: 12px; font-weight: 800; font-size: 1rem; cursor: pointer; transition: 0.2s; box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3); }
        .login-btn:hover { background: var(--primary-hover); transform: translateY(-2px); }
        .trust-badge { font-size: 0.75rem; color: var(--slate-light); margin-top: 20px; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 5px; }

        /* SIDEBAR (NAVIGATION) */
        .sidebar { width: 260px; background: var(--sidebar-bg); color: #ffffff; display: flex; flex-direction: column; padding: 30px 20px; box-sizing: border-box; position: fixed; height: 100vh; left: 0; top: 0; z-index: 500; }
        .sidebar-logo { font-size: 1.6rem; font-weight: 900; color: #ffffff; letter-spacing: -1px; margin-bottom: 40px; padding-left: 10px; }
        .sidebar-logo span { color: var(--primary); }
        .workspace-tabs { display: flex; flex-direction: column; gap: 6px; flex-grow: 1; }
        .tab-btn { padding: 12px 16px; border: none; background: transparent; cursor: pointer; font-size: 0.9rem; font-weight: 700; color: #94a3b8; text-align: left; border-radius: 10px; transition: 0.2s ease; display: flex; align-items: center; gap: 12px; }
        .tab-btn:hover { background: rgba(255,255,255,0.05); color: #ffffff; }
        .tab-btn.active { background: rgba(37, 99, 235, 0.15); color: var(--primary); border-left: 3px solid var(--primary); }
        
        .sidebar-footer { padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.05); margin-top: auto; display: flex; flex-direction: column; gap: 10px; }
        .btn-sync { background: rgba(255,255,255,0.05); color: #94a3b8; width: 100%; padding: 12px; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-sync:hover { background: rgba(255,255,255,0.1); color: #ffffff; }

        /* MAIN WRAPPER & TOPBAR */
        .main-wrapper { margin-left: 260px; width: calc(100% - 260px); display: flex; flex-direction: column; min-height: 100vh; }
        .topbar { background: var(--bg-main); padding: 15px 40px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; transition: 0.3s; }
        
        .topbar-controls { display: flex; gap: 15px; flex: 1; max-width: 500px; align-items: center; }
        .search-input { width: 100%; padding: 12px 18px; border: 1.5px solid var(--border); background: var(--white); border-radius: 50px; font-size: 0.9rem; transition: 0.2s; outline: none; font-family: inherit; font-weight: 600; color: var(--navy); box-shadow: var(--shadow-sm); }
        .search-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }
        
        .theme-toggle { background: var(--white); border: 1.5px solid var(--border); color: var(--navy); width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; font-size: 1.2rem; flex-shrink: 0; box-shadow: var(--shadow-sm); }
        .theme-toggle:hover { border-color: var(--primary); }

        .analytics-grid { display: flex; gap: 25px; }
        .stat-card { display: flex; flex-direction: column; text-align: right; }
        .stat-label { font-size: 0.7rem; font-weight: 800; color: var(--slate-light); text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-value { font-size: 1.3rem; font-weight: 900; color: var(--navy); line-height: 1; margin-top: 4px; transition: 0.3s; }

        /* THE STREAM (FEED LAYOUT) */
        .content-canvas { padding: 40px; flex-grow: 1; display: flex; justify-content: center; }
        .stream-container { width: 100%; max-width: 750px; display: flex; flex-direction: column; gap: 16px; }
        
        .job-row { background: var(--white); border-radius: 16px; padding: 24px; border: 1px solid var(--border); box-shadow: var(--shadow-sm); transition: 0.2s ease; cursor: pointer; position: relative; }
        .job-row:hover { border-color: var(--primary); box-shadow: var(--shadow-md); transform: translateY(-1px); }
        
        .row-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .job-id { font-size: 0.8rem; font-weight: 800; color: var(--slate); letter-spacing: 0.5px; }
        
        /* SEMANTIC STATUS PILLS */
        .status-pill { padding: 6px 12px; border-radius: 50px; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; }
        .pill-inbox { background: var(--pill-inbox-bg); color: var(--pill-inbox-txt); }
        .pill-pipeline { background: var(--pill-pipe-bg); color: var(--pill-pipe-txt); }
        .pill-dispatch { background: var(--pill-disp-bg); color: var(--pill-disp-txt); }
        .pill-completed { background: var(--pill-comp-bg); color: var(--pill-comp-txt); }
        .pill-archive { background: var(--pill-arch-bg); color: var(--pill-arch-txt); }

        .job-title { margin: 0 0 4px 0; color: var(--navy); font-size: 1.15rem; font-weight: 800; letter-spacing: -0.3px; transition: 0.3s; }
        .job-meta { color: var(--slate); font-weight: 600; font-size: 0.85rem; margin-bottom: 12px; }
        .job-meta span { color: var(--primary); font-weight: 800; }
        .job-desc { font-size: 0.9rem; color: var(--slate); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 16px; }
        
        .row-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border); padding-top: 16px; transition: 0.3s; }
        .tech-badge { display: flex; align-items: center; gap: 6px; font-size: 0.8rem; font-weight: 700; color: var(--slate); }
        .tech-badge .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--purple); }
        
        .action-bar { display: flex; gap: 10px; }
        .btn-stream-action { padding: 8px 16px; border-radius: 8px; font-size: 0.8rem; font-weight: 800; border: none; cursor: pointer; transition: 0.2s; }
        .btn-open-drawer { background: var(--bg-main); color: var(--navy); border: 1px solid var(--border); }
        .btn-open-drawer:hover { background: var(--border); }

        /* THE CONTEXT DRAWER */
        .drawer-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(4px); z-index: 2000; opacity: 0; pointer-events: none; transition: 0.3s ease; }
        .drawer-overlay.open { opacity: 1; pointer-events: auto; }
        
        .drawer-panel { position: fixed; right: 0; top: 0; height: 100vh; width: 100%; max-width: 480px; background: var(--white); box-shadow: var(--shadow-lg); z-index: 2001; transform: translateX(100%); transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), background-color 0.3s; display: flex; flex-direction: column; border-left: 1px solid var(--border); }
        .drawer-panel.open { transform: translateX(0); }
        
        .drawer-header { padding: 25px 30px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: var(--bg-main); transition: 0.3s; }
        .drawer-title { margin: 0; font-size: 1.2rem; font-weight: 900; color: var(--navy); }
        .drawer-close { background: transparent; border: none; font-size: 1.5rem; color: var(--slate-light); cursor: pointer; transition: 0.2s; }
        .drawer-close:hover { color: var(--danger); }
        
        .drawer-body { padding: 30px; overflow-y: auto; flex-grow: 1; }
        
        /* Drawer Form Elements */
        .admin-section-title { font-size: 0.75rem; font-weight: 900; color: var(--navy); margin: 0 0 15px 0; text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; gap: 8px; padding-bottom: 8px; border-bottom: 1.5px dashed var(--border); transition: 0.3s; }
        .control-label { font-size: 0.75rem; font-weight: 800; color: var(--slate); margin-bottom: 6px; display: block; }
        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .admin-input { width: 100%; padding: 12px 14px; border: 1.5px solid var(--border); border-radius: 10px; font-family: inherit; font-size: 0.95rem; font-weight: 600; color: var(--navy); box-sizing: border-box; transition: 0.2s; background: var(--bg-main); }
        .admin-input:focus { border-color: var(--primary); outline: none; background: var(--white); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }
        
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 30px; }
        .btn-solid { padding: 14px; border-radius: 10px; font-weight: 800; border: none; cursor: pointer; transition: 0.2s; font-size: 0.9rem; }
        .btn-draft { background: var(--bg-main); border: 1.5px solid var(--border); color: var(--slate); }
        .btn-draft:hover { border-color: var(--primary); color: var(--primary); }
        .btn-quote { background: var(--primary); color: #ffffff; }
        .btn-quote:hover { background: var(--primary-hover); }
        .btn-dp { background: rgba(245, 158, 11, 0.1); color: var(--warning); border: 1px solid rgba(245, 158, 11, 0.3); }
        .btn-dp:hover { background: rgba(245, 158, 11, 0.2); }
        .btn-assign { background: rgba(139, 92, 246, 0.1); color: var(--purple); border: 1px solid rgba(139, 92, 246, 0.3); }
        .btn-assign:hover { background: rgba(139, 92, 246, 0.2); }
        .btn-complete { background: var(--success); color: #ffffff; width: 100%; margin-bottom: 30px; }
        .btn-complete:hover { background: #059669; }
        .btn-cancel-job { background: transparent; color: var(--danger); width: 100%; border: 1.5px dashed var(--danger); }
        .btn-cancel-job:hover { background: rgba(239, 68, 68, 0.1); }

        /* TOAST NOTIFICATION SYSTEM */
        #toastContainer { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
        .toast { background: #0f172a; color: #ffffff; padding: 14px 24px; border-radius: 50px; font-size: 0.9rem; font-weight: 700; box-shadow: 0 10px 25px rgba(0,0,0,0.3); display: flex; align-items: center; gap: 10px; animation: slideUpToast 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); transition: opacity 0.3s ease; }
        .toast-success { background: var(--success); }
        .toast-error { background: var(--danger); }
        .toast-info { background: #0f172a; }
        @keyframes slideUpToast { from { transform: translateY(20px) scale(0.9); opacity: 0; } to { transform: translateY(0) scale(1); opacity: 1; } }

        .loader-skeleton { height: 160px; background: linear-gradient(90deg, var(--bg-main) 25%, var(--border) 50%, var(--bg-main) 75%); background-size: 200% 100%; animation: pulse 1.5s infinite; border-radius: 16px; margin-bottom: 16px; border: 1px solid var(--border); }
        @keyframes pulse { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* RESPONSIVE */
        @media (max-width: 1024px) {
            .sidebar { width: 100%; height: auto; position: static; padding: 20px; border-right: none; border-bottom: 1px solid rgba(255,255,255,0.1); }
            .workspace-tabs { flex-direction: row; overflow-x: auto; padding-bottom: 10px; }
            .main-wrapper { margin-left: 0; width: 100%; }
            .topbar { flex-direction: column; gap: 15px; align-items: stretch; padding: 20px; }
            .topbar-controls { max-width: 100%; }
            .content-canvas { padding: 20px; }
            .drawer-panel { max-width: 100%; }
        }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-box">
        <div class="login-logo">Z<span>connects</span></div>
        <h3 style="margin:0 0 15px 0; color:var(--slate); font-size:1rem;">Enterprise Command</h3>
        <input type="password" id="adminPass" class="login-input" placeholder="Secure Key">
        <button class="login-btn" onclick="verifyLogin()">Authenticate</button>
        <div class="trust-badge">🔒 End-to-End Encrypted</div>
        <p id="loginError" style="color:var(--danger); display:none; margin-top:15px; font-size:0.85rem; font-weight:700;">Invalid Credentials</p>
    </div>
</div>

<div id="appContainer">
    <aside class="sidebar">
        <div class="sidebar-logo">Z<span>connects</span></div>
        <nav class="workspace-tabs">
            <button class="tab-btn active" onclick="setWorkspace('inbox', this)">📥 Inbox (New)</button>
            <button class="tab-btn" onclick="setWorkspace('pipeline', this)">⚡ Quoted / Pipeline</button>
            <button class="tab-btn" onclick="setWorkspace('dispatched', this)">🚀 Dispatched</button>
            <button class="tab-btn" onclick="setWorkspace('completed', this)">✅ Completed</button>
            <button class="tab-btn" onclick="setWorkspace('archive', this)">🗄️ Archive</button>
        </nav>
        <div class="sidebar-footer">
            <button class="btn-sync" onclick="loadJobs(STATE.pass, true)">↻ Sync Data</button>
        </div>
    </aside>

    <main class="main-wrapper">
        <header class="topbar">
            <div class="topbar-controls">
                <input type="text" id="searchInput" class="search-input" placeholder="Search ID, Name, Tech..." oninput="applyFilter()">
                <button class="theme-toggle" onclick="toggleTheme()" title="Toggle Dark Mode" id="themeBtn">🌙</button>
            </div>
            <div class="analytics-grid">
                <div class="stat-card"><span class="stat-label">Inbox</span><span class="stat-value" id="stat-inbox">0</span></div>
                <div class="stat-card"><span class="stat-label">Active</span><span class="stat-value text-primary" id="stat-active">0</span></div>
            </div>
        </header>

        <div class="content-canvas">
            <div id="streamContainer" class="stream-container">
                <div id="loader" style="display:none; width: 100%;">
                    <div class="loader-skeleton"></div>
                    <div class="loader-skeleton"></div>
                    <div class="loader-skeleton"></div>
                </div>
                
                <div id="jobsList" style="width: 100%; display: flex; flex-direction: column; gap: 16px;"></div>
                
                <div id="noResultsMsg" style="display:none; text-align:center; color:var(--slate-light); padding: 60px 20px; background:var(--white); border-radius:16px; border:1px dashed var(--border); font-weight:600;">No records found in this workspace.</div>
            </div>
        </div>
    </main>
</div>

<div id="drawerOverlay" class="drawer-overlay" onclick="closeDrawer()"></div>
<div id="manageDrawer" class="drawer-panel">
    <div class="drawer-header">
        <h2 id="drawerTitle" class="drawer-title">Manage ZC-000</h2>
        <button class="drawer-close" onclick="closeDrawer()">✕</button>
    </div>
    
    <div class="drawer-body">
        <input type="hidden" id="drawerJobId">
        
        <div class="admin-section-title"><span>📝</span> Phase 1: Quoting</div>
        <div class="input-grid">
            <div>
                <label class="control-label">Quote Price (PHP)</label>
                <input type="number" id="drawerPrice" class="admin-input" placeholder="e.g. 3500">
            </div>
            <div>
                <label class="control-label">Actual Cost (PHP)</label>
                <input type="number" id="drawerCost" class="admin-input" placeholder="e.g. 1500">
            </div>
        </div>
        <label class="control-label">Engineer Notes (Internal)</label>
        <input type="text" id="drawerNotes" class="admin-input" style="margin-bottom:20px;" placeholder="Technical details...">
        <div class="action-grid">
            <button class="btn-solid btn-draft" onclick="executeAction('save_draft')">💾 Save Draft</button>
            <button class="btn-solid btn-quote" onclick="executeAction('send_quote')">📧 Send Quote</button>
        </div>

        <div class="admin-section-title"><span>🚀</span> Phase 2: Dispatch</div>
        <label class="control-label">Assign Technician</label>
        <select id="drawerTech" class="admin-input" style="margin-bottom:20px;"></select>
        <div class="action-grid">
            <button class="btn-solid btn-dp" onclick="executeAction('verify_dp')">💳 Verify DP</button>
            <button class="btn-solid btn-assign" onclick="executeAction('assign_tech')">Deploy Tech</button>
        </div>

        <div class="admin-section-title" style="margin-bottom: 15px;"><span>✅</span> Phase 3: Completion</div>
        <button class="btn-solid btn-complete" onclick="executeAction('mark_complete')">Mark as Completed</button>

        <div class="admin-section-title" style="margin-bottom: 15px; color: var(--danger); border-bottom-color: var(--border);"><span>⚠️</span> Danger Zone</div>
        <select id="drawerCancelReason" class="admin-input" style="margin-bottom:10px;">
            <option value="Client will no longer proceed">Client will no longer proceed</option>
            <option value="Out of budget / Price too high">Out of budget / Price too high</option>
            <option value="Resolved internally / Self-fixed">Resolved internally / Self-fixed</option>
            <option value="Schedule conflict / Unresponsive">Schedule conflict / Unresponsive</option>
        </select>
        <button class="btn-solid btn-cancel-job" onclick="executeAction('cancel_job')">Cancel & Archive Booking</button>
    </div>
</div>

<div id="toastContainer"></div>

<script>
    // ==========================================
    // 1. CONFIGURATION, THEME & STATE
    // ==========================================
    const CONFIG = {
        APP_URL: 'https://script.google.com/macros/s/AKfycbw3c915eKVYlXdYhva6ZtlNDXOahN7nXWrht_PPQKYfHf6Su_jgmTOSs4dlqeEZbxvsxA/exec',
        TECHNICIANS: ["Jasper Jubay", "Francis Intong", "Jeffrey Canete", "Jerome", "Lyndon Alburo", "Clark Toquero"]
    };

    const STATE = { pass: '', workspace: 'inbox', jobsData: [] };

    // Initialize Tech Dropdown
    document.getElementById('drawerTech').innerHTML = `<option value="">-- Select Tech --</option>` + 
        CONFIG.TECHNICIANS.map(t => `<option value="${t}">${t}</option>`).join('');

    // Theme Management
    function initTheme() {
        if(localStorage.getItem('theme') === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
            document.getElementById('themeBtn').innerText = '☀️';
        }
    }
    
    function toggleTheme() {
        const doc = document.documentElement;
        const btn = document.getElementById('themeBtn');
        if (doc.getAttribute('data-theme') === 'dark') {
            doc.removeAttribute('data-theme');
            localStorage.setItem('theme', 'light');
            btn.innerText = '🌙';
        } else {
            doc.setAttribute('data-theme', 'dark');
            localStorage.setItem('theme', 'dark');
            btn.innerText = '☀️';
        }
    }
    initTheme();

    // ==========================================
    // 2. TOAST NOTIFICATION SYSTEM
    // ==========================================
    function showToast(message, type = 'info') {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = `toast toast-${type}`;
        let icon = type === 'success' ? '✅' : type === 'error' ? '⚠️' : 'ℹ️';
        toast.innerHTML = `<span>${icon}</span> <span>${message}</span>`;
        container.appendChild(toast);
        setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 3000);
    }

    // ==========================================
    // 3. AUTHENTICATION (BACKEND VALIDATION)
    // ==========================================
    async function verifyLogin() {
        const pass = document.getElementById('adminPass').value;
        const loginBtn = document.querySelector('.login-btn');
        loginBtn.innerText = "Authenticating...";

        try {
            const response = await fetch(`${CONFIG.APP_URL}?action=get_admin_data`, { method: 'POST', body: JSON.stringify({ action: 'get_admin_data', password: pass }) });
            const jobs = await response.json();

            if(jobs.error) { 
                document.getElementById('loginError').style.display = 'block';
                loginBtn.innerText = "Authenticate";
                return; 
            }
            
            // Security: Inject UI only after valid response
            STATE.pass = pass;
            STATE.jobsData = jobs;
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('appContainer').classList.add('authenticated');
            showToast("Secure connection established.", "success");
            renderStream();

        } catch (err) { 
            showToast("Connection Error. Please check your network.", "error");
            loginBtn.innerText = "Authenticate";
        }
    }

    async function loadJobs(password, showFeedback = false) {
        document.getElementById('loader').style.display = 'block';
        document.getElementById('jobsList').innerHTML = '';
        document.getElementById('noResultsMsg').style.display = 'none';

        try {
            const response = await fetch(`${CONFIG.APP_URL}?action=get_admin_data`, { method: 'POST', body: JSON.stringify({ action: 'get_admin_data', password: password }) });
            const jobs = await response.json();

            document.getElementById('loader').style.display = 'none';
            if(jobs.error) { location.reload(); return; }
            
            STATE.jobsData = jobs;
            renderStream();
            if(showFeedback) showToast("Data synchronized successfully.", "success");
        } catch (err) { 
            showToast("Failed to sync data.", "error");
            document.getElementById('loader').style.display = 'none';
        }
    }

    // ==========================================
    // 4. UI RENDERING (THE STREAM)
    // ==========================================
    function getSemanticClass(status) {
        status = (status || "").toLowerCase();
        if (status.includes('cancel')) return 'pill-archive'; 
        if (status.includes('completed') || status.includes('done')) return 'pill-completed';
        if (status.includes('quote') || status.includes('received')) return 'pill-pipeline';
        if (status.includes('dispatch') || status.includes('assign')) return 'pill-dispatch';
        return 'pill-inbox'; 
    }

    function getWorkspaceTag(status) {
        status = (status || "").toLowerCase();
        if (status.includes('cancel')) return 'archive'; 
        if (status.includes('completed') || status.includes('done')) return 'completed';
        if (status.includes('dispatch') || status.includes('assign')) return 'dispatched';
        if (status.includes('quote') || status.includes('received')) return 'pipeline';
        return 'inbox'; 
    }

    function renderStream() {
        let inboxCount = 0, activeCount = 0;
        const list = document.getElementById('jobsList');
        list.innerHTML = '';

        if (!STATE.jobsData || STATE.jobsData.length === 0) {
            document.getElementById('noResultsMsg').style.display = 'block';
            return;
        }

        STATE.jobsData.forEach(job => {
            const workspaceTag = getWorkspaceTag(job.status);
            const semanticClass = getSemanticClass(job.status);
            const searchText = `${job.id} ${job.name} ${job.status} ${job.category} ${job.tech || ''}`.toLowerCase();
            
            if(workspaceTag === 'inbox') inboxCount++;
            if(workspaceTag === 'pipeline' || workspaceTag === 'dispatched') activeCount++;

            const row = document.createElement('div');
            row.className = 'job-row';
            row.dataset.workspace = workspaceTag;
            row.dataset.search = searchText;
            
            row.innerHTML = `
                <div class="row-header">
                    <span class="job-id">${escapeHTML(job.id)}</span>
                    <span class="status-pill ${semanticClass}">${escapeHTML(job.status)}</span>
                </div>
                <h3 class="job-title">${escapeHTML(job.name)}</h3>
                <div class="job-meta"><span>${escapeHTML(job.category)}</span> • ${escapeHTML(job.urgency)}</div>
                <div class="job-desc">${escapeHTML(job.desc)}</div>
                
                <div class="row-footer">
                    <div class="tech-badge">
                        ${job.tech && job.tech !== 'Unassigned' ? `<div class="dot"></div> Deployed: ${escapeHTML(job.tech)}` : ''}
                        ${job.photo && job.photo !== 'No Photo' ? ` | 📸 Photo Attached` : ''}
                    </div>
                    <div class="action-bar">
                        <button class="btn-stream-action btn-open-drawer" onclick="openDrawer('${job.id}')">⚙️ Manage Workflow</button>
                    </div>
                </div>
            `;
            list.appendChild(row);
        });

        document.getElementById('stat-inbox').innerText = inboxCount;
        document.getElementById('stat-active').innerText = activeCount;
        applyFilter(); 
    }

    function setWorkspace(workspace, btn) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        STATE.workspace = workspace;
        applyFilter();
    }

    function applyFilter() {
        const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
        const rows = document.querySelectorAll('.job-row');
        let visibleCount = 0;

        rows.forEach(row => {
            const rowWorkspace = row.dataset.workspace;
            const rowSearchText = row.dataset.search;
            const workspaceMatch = (STATE.workspace === 'all') || (STATE.workspace === rowWorkspace);
            const searchMatch = rowSearchText.includes(searchTerm);

            if (workspaceMatch && searchMatch) {
                row.style.display = "block";
                visibleCount++;
            } else {
                row.style.display = "none";
            }
        });

        document.getElementById('noResultsMsg').style.display = (visibleCount === 0 && rows.length > 0) ? 'block' : 'none';
    }

    function escapeHTML(str) {
        if (!str) return "";
        return str.toString().replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
    }

    // ==========================================
    // 5. CONTEXT DRAWER LOGIC
    // ==========================================
    function openDrawer(id) {
        const job = STATE.jobsData.find(j => j.id === id);
        if(!job) return;

        document.getElementById('drawerTitle').innerText = `Manage ${job.id}`;
        document.getElementById('drawerJobId').value = job.id;
        document.getElementById('drawerPrice').value = job.price || '';
        document.getElementById('drawerCost').value = job.cost || '';
        document.getElementById('drawerNotes').value = job.notes || '';
        document.getElementById('drawerTech').value = job.tech || '';
        
        document.getElementById('drawerOverlay').classList.add('open');
        document.getElementById('manageDrawer').classList.add('open');
    }

    function closeDrawer() {
        document.getElementById('drawerOverlay').classList.remove('open');
        document.getElementById('manageDrawer').classList.remove('open');
    }

    // ==========================================
    // 6. ACTION HANDLERS
    // ==========================================
    async function executeAction(actionType) {
        const id = document.getElementById('drawerJobId').value;
        const price = document.getElementById('drawerPrice').value;
        const cost = document.getElementById('drawerCost').value;
        const notes = document.getElementById('drawerNotes').value;
        const tech = document.getElementById('drawerTech').value;
        
        let payload = { bookingId: id, price: price, cost: cost, notes: notes, tech: tech };

        if (actionType === 'send_quote') {
            if(!price) return showToast("Quote Price is required.", "error");
            payload.action = 'save_and_send_quote';
            showToast("Generating and sending PDF quote...", "info");
        } 
        else if (actionType === 'assign_tech') {
            if(!tech) return showToast("Please select a technician.", "error");
            payload.action = 'update_status';
            payload.newStatus = `Dispatched: ${tech}`;
            showToast("Deploying technician...", "info");
            sendAction({ action: 'save_draft', bookingId: id, price: price, cost: cost, notes: notes, tech: tech });
        }
        else if (actionType === 'verify_dp') {
            payload.action = 'update_status';
            payload.newStatus = 'DP Received - Ready for Dispatch';
            showToast("Verifying payment...", "info");
        }
        else if (actionType === 'mark_complete') {
            payload.action = 'update_status';
            payload.newStatus = 'Job Completed';
            showToast("Marking as completed...", "info");
        }
        else if (actionType === 'cancel_job') {
            if(!confirm("Are you sure you want to permanently cancel this job?")) return;
            const reason = document.getElementById('drawerCancelReason').value;
            payload.action = 'update_status';
            payload.newStatus = `Cancelled - ${reason}`;
            showToast("Archiving job...", "info");
        }
        else { 
            payload.action = 'save_draft';
            showToast("Saving changes...", "info");
        }

        closeDrawer();
        const res = await sendAction(payload);
        
        if(!res.error) {
            showToast("Action successful!", "success");
            loadJobs(STATE.pass, false); 
        }
    }

    async function sendAction(payload) {
        payload.password = STATE.pass; 
        try {
            const response = await fetch(CONFIG.APP_URL, { method: 'POST', body: JSON.stringify(payload) });
            const data = await response.json();
            if(data.error) {
                showToast(data.error, "error");
                if(data.error.includes("Unauthorized")) location.reload();
            }
            return data;
        } catch(err) {
            showToast("Network error.", "error");
            return { error: "Network Error" };
        }
    }
</script>
